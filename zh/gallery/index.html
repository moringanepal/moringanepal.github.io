    body { background-color: #1a2e17; background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('../../res/bg.png'); background-size: cover; background-attachment: fixed; }

    .page-hero { text-align: center; padding: 3rem 1rem 2rem; }
    .page-hero h1 { font-family: 'Chelsea Market', cursive; font-size: clamp(2rem, 6vw, 3.5rem); color: #F5F5DC; text-shadow: 0 2px 20px rgba(27, 94, 32, 0.3); }
    .page-hero p { color: rgba(245,245,220,0.72); font-size: 1.1rem; }
    .gallery-page { max-width: 1400px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .masonry-grid {
      column-count: 2;
      column-gap: 14px;
    }
    @media (min-width: 720px) { .masonry-grid { column-count: 3; } }
    @media (min-width: 1000px) { .masonry-grid { column-count: 4; } }
    @media (min-width: 1320px) { .masonry-grid { column-count: 5; } }

    .masonry-item {
      break-inside: avoid;
      margin: 0 0 14px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(0,0,0,0.25);
    }
    .masonry-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.35s ease;
    }
    .masonry-item:hover img { transform: scale(1.03); }

    .gallery-loading { text-align: center; padding: 4rem 1rem; color: rgba(245,245,220,0.7); }
    .gallery-empty { text-align: center; padding: 4rem 1rem; color: rgba(245,245,220,0.7); }
  </style>

  <script>
    document.getElementById('year')&&(document.getElementById('year').textContent=new Date().getFullYear());

    (async function() {
      const grid = document.getElementById('gallery-grid');
      const loading = document.getElementById('gallery-loading');
      const empty = document.getElementById('gallery-empty');
      const baseUrls = ['../../gallery/', '../../res/'];
      const maxImages = 100;
      const fileNamesFor = (n) => ([
        `${n}.png`, `${n}.jpg`, `${n}.jpeg`, `${n}.webp`,
        `${n}.png.jpg`, `${n}.png.jpeg`, `${n}.png.webp`,
      ]);

      async function loadManifest() {
        const res = await fetch('../../gallery/images.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('manifest fetch failed');
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('manifest invalid');
        return data
          .map((x) => (typeof x === 'string' ? x : (x && typeof x.url === 'string' ? x.url : null)))
          .filter(Boolean);
      }

      async function loadImageSequential(n) {
        for (const baseUrl of baseUrls) {
          for (const fileName of fileNamesFor(n)) {
            const result = await new Promise((resolve) => {
              const img = new Image();
              img.onload = () => resolve(baseUrl + fileName);
              img.onerror = () => resolve(null);
              img.src = baseUrl + fileName;
            });
            if (result) return result;
          }
        }
        return null;
      }

      let urls = [];
      try {
        const names = await loadManifest();
        urls = names.map((name) => (name.startsWith('http') ? name : ('../../gallery/' + name.replace(/^\.\/+/, ''))));
      } catch (e) {
        for (let i = 1; i <= maxImages; i++) {
          const url = await loadImageSequential(i);
          if (url) urls.push(url);
        }
      }

      loading.style.display = 'none';
      if (urls.length === 0) {
        empty.style.display = 'block';
        return;
      }

      grid.style.display = 'block';
      urls.forEach((url, idx) => {
        const div = document.createElement('div');
        div.className = 'masonry-item';
        const img = document.createElement('img');
        img.src = url;
        img.alt = '相册图片 ' + (idx + 1);
        img.loading = idx < 12 ? 'eager' : 'lazy';
        div.appendChild(img);
        div.addEventListener('click', () => window.open(url, '_blank'));
        grid.appendChild(div);
      });
    })();
  </script>
</body>
